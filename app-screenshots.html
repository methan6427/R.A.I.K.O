<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Screenshots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .gallery {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            padding: 10px 0;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .gallery::-webkit-scrollbar {
            display: none;
        }

        .gallery-item {
            flex-shrink: 0;
            width: 160px;
            aspect-ratio: 9 / 16;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            scroll-snap-align: start;
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>App Screenshots</h1>
        <div class="gallery">
            <div class="gallery-item">
                <img src="screenshots/00_Preview.png" alt="App screenshot 1">
            </div>
            <div class="gallery-item">
                <img src="screenshots/01_screen.png" alt="App screenshot 2">
            </div>
            <div class="gallery-item">
                <img src="screenshots/02_screen.png" alt="App screenshot 3">
            </div>
            <div class="gallery-item">
                <img src="screenshots/03_screen.png" alt="App screenshot 4">
            </div>
            <div class="gallery-item">
                <img src="screenshots/04_screen.png" alt="App screenshot 5">
            </div>
            <div class="gallery-item">
                <img src="screenshots/05_screen.png" alt="App screenshot 6">
            </div>
            <div class="gallery-item">
                <img src="screenshots/06_screen.png" alt="App screenshot 7">
            </div>
        </div>
    </div>
</body>
</html>
