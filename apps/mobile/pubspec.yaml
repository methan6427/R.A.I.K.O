name: raiko_mobile
description: R.A.I.K.O mobile client.
publish_to: none
version: 0.2.1+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  raiko_ui:
    path: ../../packages/raiko_ui
  shared_theme:
    path: ../../packages/shared_theme
  shared_preferences: ^2.3.2
  device_info_plus: ^11.1.0
  path_provider: ^2.1.0
  audioplayers: ^5.2.0
  permission_handler: ^11.4.0
  url_launcher: ^6.2.0
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true